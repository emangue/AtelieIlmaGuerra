# =============================================================================
# Nginx do SISTEMA — Roteador independente (portas 80 e 443)
# =============================================================================
#
# Coloque em: /etc/nginx/sites-available/roteador
# Ative: sudo ln -sf /etc/nginx/sites-available/roteador /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# Certificados: /etc/letsencrypt/ (certbot do sistema)
# Certbot: sudo certbot renew (cron ou manual)
#
# Fluxo: Internet → Nginx sistema (SSL) → HTTP interno
#          ├── meufinup.com.br     → 127.0.0.1:8080 (Docker FinUp)
#          └── gestao.atelie...    → 127.0.0.1:3004 e 8001 (Ateliê)
# =============================================================================

# ── meufinup.com.br ───────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name meufinup.com.br www.meufinup.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name meufinup.com.br www.meufinup.com.br;

    ssl_certificate     /etc/letsencrypt/live/meufinup.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meufinup.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

